<!DOCTYPE html>
<!-- App account deletion instructions (per-locale static page; nt replaced at build) -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noting 계정 삭제 안내</title>
    <meta name="description" content="Noting 앱에서 계정을 삭제하는 방법과 삭제 시 데이터 처리 안내입니다." />
    <link rel="canonical" href="https://newon.app/ko/noting/delete-account/" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/ox-month.css" />
    <script src="/theme-shell.js"></script>
    <style>
      .legal-page { padding: calc(var(--header-h) + 2rem) 0 4rem; min-height: 70vh; }
      .legal-inner { width: min(720px, calc(100% - var(--space) * 2)); margin: 0 auto; }
      .legal-inner h1 { font-size: clamp(1.5rem, 4vw, 2rem); margin-bottom: 0.5rem; color: var(--text); }
      .legal-meta { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
      .legal-inner h2 { font-size: 1.1rem; margin: 2rem 0 0.75rem; color: var(--text); }
      .legal-inner p { margin: 0 0 1rem; color: var(--text-muted); line-height: 1.65; }
      .legal-inner .legal-body ol.legal-steps {
        margin: 0 0 1rem 1.25rem;
        padding: 0;
        color: var(--text-muted);
        line-height: 1.65;
      }
      .legal-inner .legal-body ol.legal-steps li { margin-bottom: 0.4rem; }
      .legal-inner .legal-body ul.legal-bullets {
        margin: 0 0 1rem 1.15rem;
        padding: 0;
        color: var(--text-muted);
        line-height: 1.65;
      }
      .legal-inner .legal-body ul.legal-bullets li { margin-bottom: 0.4rem; }
      .legal-inner .legal-body a { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
      .legal-back { display: inline-block; margin-bottom: 1.5rem; color: var(--text-muted); font-weight: 500; }
      .legal-back:hover { color: var(--text); }
    </style>
    <script src="/lang-nav.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#legal-main">본문으로 건너뛰기</a>
    <header class="site-header">
      <div class="container header-inner header-inner--legal">
        <a class="legal-back" href="../../">홈으로</a>
        <div class="navbar-controls">
          <button
            type="button"
            class="navbar-theme-toggle"
            data-theme-toggle
            data-label-light="라이트 모드로 전환"
            data-label-dark="다크 모드로 전환"
            title="테마 전환"
            aria-label="다크 모드로 전환"
          >🌙</button>
          <div class="lang-switcher" data-lang-switcher>
            <label class="visually-hidden" for="lang-select-app-del">언어</label>
          <select id="lang-select-app-del" class="lang-select" data-lang-select aria-label="언어">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="es">Español</option>
            <option value="pt-br">Português (Brasil)</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="hi">हिन्दी</option>
            <option value="id">Bahasa Indonesia</option>
          </select>
        </div>
        </div>
      </div>
    </header>
    <main id="legal-main" class="legal-page">
      <div class="legal-inner">
        <h1>Noting 계정 삭제 안내</h1>
        <p class="legal-meta">앱 이름: Noting · 개발자: Newon</p>
        <div class="legal-body"><p>사용자는 앱 내에서 직접 계정을 삭제할 수 있습니다.</p><h2>계정 삭제 방법</h2><ol class="legal-steps"><li>앱 실행</li><li>설정(Settings) 메뉴로 이동</li><li>계정(Account) 선택</li><li>「계정 삭제(Delete Account)」 버튼을 탭합니다</li></ol><h2>삭제 시 처리</h2><ul class="legal-bullets"><li>모든 사용자 데이터는 즉시 삭제됩니다.</li><li>삭제된 데이터는 복구할 수 없습니다.</li></ul><h2>문의</h2><p><a href="mailto:newon@newon.app">newon@newon.app</a></p></div>
      </div>
    </main>
    <script>
      (function () {
        var cur = "ko";
        document.querySelectorAll("[data-lang-select]").forEach(function (sel) {
          sel.value = cur;
        });
      })();
    </script>
    <script src="/lang-dropdown.js"></script>
  </body>
</html>
