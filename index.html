<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="naver-site-verification" content="a25d3a622d32be17d2e9c60a8be843a211faff68" />
  <title>Newon</title>
  <script>
    (function () {
      var langs = ["ko", "en", "ja", "es", "pt-br", "fr", "de", "hi", "id"];
      var lang = "ko";
      try {
        var saved = localStorage.getItem("newon-lang-dir");
        if (saved && langs.indexOf(saved) !== -1) lang = saved;
      } catch (e) {}
      location.replace("/" + lang + "/");
    })();
  </script>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; padding: 1.2rem">
    Redirecting… <a href="/ko/">Open Newon</a>
  </p>
</body>
</html>
