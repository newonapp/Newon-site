# Copy legal_site/ contents to your Netlify publish root (or deploy this folder).
[build]
  publish = "."

[[redirects]]
  from = "/terms"
  to = "/terms/"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/privacy/"
  status = 301

[[headers]]
  for = "/app-ads.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
