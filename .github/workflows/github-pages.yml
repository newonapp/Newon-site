# GitHub: Settings → Pages → Build: GitHub Actions
# main 푸시 시 HTML·CSS·assets(이미지 포함)만 묶어서 배포합니다.

name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble public site
        run: |
          set -e
          mkdir -p _publish
          cp index.html styles.css ox-month.css _publish/
          cp -R assets _publish/assets
          if [ -f CNAME ]; then cp CNAME _publish/; fi

      - name: Verify images (must exist at deploy root)
        run: |
          set -euo pipefail
          for rel in \
            assets/logo.png \
            assets/feature-grid.png \
            assets/hero-promo.png \
            assets/ox-month/logo.png \
            assets/ox-month/step-add-habit.png \
            assets/ox-month/step-daily-check.png \
            assets/ox-month/step-stats.png
          do
            f="_publish/$rel"
            if [[ ! -f "$f" ]]; then
              echo "::error::Missing $f — check repo assets/ and git add"
              exit 1
            fi
          done
          test -f _publish/index.html
          echo "OK — index.html + all PNGs in _publish"
          ls -laR _publish/assets

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _publish

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
