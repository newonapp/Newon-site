# GitHub: Settings → Pages → Build: GitHub Actions
# main 푸시 시 빌드 + 정적 자산을 한 번에 묶어 GitHub Pages에 배포합니다.

name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and assemble site
        run: node scripts/publish-site.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _publish

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
